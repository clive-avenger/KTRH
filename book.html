<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Appointment - KTRH Booking System</title>
  <style>
    :root {
      --primary: #2a7de1;
      --accent: #1d5ca6;
      --bg: #f8fafb;
      --text: #333;
      --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      animation: fadeIn 1s ease-in-out;
    }

    
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(42, 125, 225, 0.9);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow);
      flex-wrap: wrap;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo-img {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .nav-logo-text {
      font-size: 18px;
      font-weight: bold;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-link {
      color: white;
      text-decoration: none;
      font-size: 15px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.3s, transform 0.2s;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    .active-link {
      background: white;
      color: var(--primary);
      font-weight: bold;
    }

    .logout-btn {
      background: #dc3545;
      border: none;
      border-radius: 6px;
      color: white;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: #b02a37;
    }

    .user-email {
      font-size: 13px;
      opacity: 0.9;
    }

    
    .container {
      max-width: 650px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.7s ease;
    }

    h2 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #444;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      outline: none;
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background: var(--accent);
    }

    
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .nav-right {
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
        gap: 6px;
        margin-top: 10px;
      }
      .container {
        margin: 20px;
        padding: 25px;
      }
    }

    @media (max-width: 480px) {
      .container {
        margin: 15px;
        padding: 20px;
      }
      h2 {
        font-size: 20px;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes fadeUp {
      from {
        transform: translateY(25px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  
  <nav class="navbar">
    <div class="nav-left">
      <img src="logo.jpg" alt="KTRH Logo" class="nav-logo-img" />
      <span class="nav-logo-text">KTRH Booking</span>
    </div>
    <div class="nav-right">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="book.html" class="nav-link active-link">Book</a>
      <a href="appointments.html" class="nav-link">My Appointments</a>
      <a href="contact.html" class="nav-link">Contact</a>
      <span id="userEmail" class="user-email"></span>
      <button id="logoutNavBtn" class="logout-btn">Logout</button>
    </div>
  </nav>

  
  <div class="container">
    <h2>Book an Appointment</h2>
    <form id="appointmentForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required />

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required />

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="e.g. 0712 345 678" required />

      <label for="department">Department</label>
      <select id="department" name="department" required>
        <option value="">-- Select Department --</option>
        <option value="outpatient">Outpatient</option>
        <option value="dental">Dental</option>
        <option value="maternity">Maternity</option>
        <option value="surgery">Surgery</option>
        <option value="pediatrics">Pediatrics</option>
      </select>

      <label for="doctor">Doctor</label>
      <input type="text" id="doctor" name="doctor" placeholder="Doctor’s name" />

      <label for="date">Preferred Date</label>
      <input type="date" id="date" name="date" required />

      <label for="time">Preferred Time</label>
      <input type="time" id="time" name="time" required />

      <button type="submit" class="btn">Submit Appointment</button>
    </form>
  </div>

  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6HxYoAQ5nb3u_TohMAe3KtsAjJJNhxq8",
      authDomain: "ktrh-98dc6.firebaseapp.com",
      databaseURL: "https://ktrh-98dc6-default-rtdb.firebaseio.com",
      projectId: "ktrh-98dc6",
      storageBucket: "ktrh-98dc6.firebasestorage.app",
      messagingSenderId: "836026469615",
      appId: "1:836026469615:web:7857cef4d10fab891b1f1a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const form = document.getElementById("appointmentForm");
    const userEmailEl = document.getElementById("userEmail");
    const logoutBtn = document.getElementById("logoutNavBtn");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        userEmailEl.textContent = `👤 ${user.email}`;
      } else {
        window.location.href = "login.html";
      }
    });

    logoutBtn.addEventListener("click", () => {
      signOut(auth).then(() => {
        alert("You have logged out successfully.");
        window.location.href = "login.html";
      });
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const phone = form.phone.value.trim();
      const department = form.department.value;
      const doctor = form.doctor.value.trim();
      const date = form.date.value;
      const time = form.time.value;

      if (!name || !email || !phone || !department || !date || !time) {
        alert("Please fill in all required fields.");
        return;
      }

      try {
        const appointmentsRef = ref(db, "appointments");
        const newAppointmentRef = push(appointmentsRef);
        await set(newAppointmentRef, {
          name,
          email,
          phone,
          department,
          doctor,
          date,
          time,
          status: "Pending"
        });
        window.location.href = "success.html";
      } catch (error) {
        console.error("Error saving appointment:", error);
        alert("Failed to save appointment. Try again.");
      }
    });
  </script>
</body>
</html>
