<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - KTRH Booking System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f9fa;
    }
    header {
      background: #2a7de1;
      color: white;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #2a7de1;
      margin-bottom: 20px;
    }
    .info {
      margin-bottom: 30px;
    }
    .info p {
      margin: 8px 0;
      color: #333;
      font-size: 16px;
    }
    .map {
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
    }
    form {
      margin-top: 30px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    input:focus, textarea:focus {
      border-color: #2a7de1;
      outline: none;
    }
    .btn {
      background: #2a7de1;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #1d5ca6;
    }
  </style>
</head>
<body>
  <header>
    <h1>KTRH Booking System</h1>
  </header>

  <div class="container">
    <h2>Contact Us</h2>
    <div class="info">
      <p><strong>Address:</strong> Kisii Teaching and Referral Hospital, Kisii, Kenya</p>
      <p><strong>Phone:</strong> +254 712 345 678</p>
      <p><strong>Email:</strong> info@ktrh.ac.ke</p>
      <p><strong>Working Hours:</strong> Mon - Fri, 8:00 AM - 5:00 PM</p>
    </div>

    <div class="map">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.7201475187464!2d34.77954827496542!3d-0.6810314352746047!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182930ffbe40d7c7%3A0xb5df7b04d87b2a7f!2sKisii%20Teaching%20and%20Referral%20Hospital!5e0!3m2!1sen!2ske!4v1696422091607!5m2!1sen!2ske" 
        width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <form>
      <h3>Send us a Message</h3>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your message..." required></textarea>

      <button type="submit" class="btn">Send Message</button>
    </form>
  </div>
</body>
</html>
